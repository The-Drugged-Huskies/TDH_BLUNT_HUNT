<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Deploy Leaderboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: monospace;
            background: #222;
            color: #0f0;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #0f0;
            color: #000;
            border: none;
            margin: 10px 0;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #log {
            margin-top: 20px;
            white-space: pre-wrap;
            border: 1px solid #444;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            background: #000;
        }

        .error {
            color: #f00;
        }

        .success {
            color: #0f0;
            font-weight: bold;
        }

        .warn {
            color: #ff0;
        }

        #status {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #555;
        }
    </style>
</head>

<body>
    <h1>Deploy Leaderboard Contract</h1>
    <div id="status">Compiler Status: <span id="compilerState" style="color: #ff0">Initializing Worker...</span></div>

    <p>1. Connect Wallet (Dogechain)</p>
    <button id="connectBtn">Connect Wallet</button>
    <div id="walletInfo"></div>

    <p>2. Deploy Contract</p>
    <button id="deployBtn" disabled>Deploy Contract</button>

    <div id="log"></div>

    <script>
        const contractSource = `
// SPDX-License-Identifier: MIT
pragma solidity ^0.8.0;

/**
 * @dev Provides information about the current execution context, including the
 * sender of the transaction and its data. While these are generally available
 * via msg.sender and msg.data, they should not be accessed in such a direct
 * manner, since when dealing with meta-transactions the account sending and
 * paying for execution may not be the actual sender (as far as an application
 * is concerned).
 *
 * This contract is only required for intermediate, library-like contracts.
 */
abstract contract Context {
    function _msgSender() internal view virtual returns (address) {
        return msg.sender;
    }

    function _msgData() internal view virtual returns (bytes calldata) {
        return msg.data;
    }
}

/**
 * @dev Contract module which provides a basic access control mechanism, where
 * there is an account (an owner) that can be granted exclusive access to
 * specific functions.
 *
 * By default, the owner account will be the one that deploys the contract. This
 * can later be changed with {transferOwnership}.
 *
 * This module is used through inheritance. It will make available the modifier
 * \`onlyOwner\`, which can be applied to your functions to restrict their use to
 * the owner.
 */
abstract contract Ownable is Context {
    address private _owner;

    event OwnershipTransferred(address indexed previousOwner, address indexed newOwner);

    /**
     * @dev Initializes the contract setting the deployer as the initial owner.
     */
    constructor() {
        _transferOwnership(_msgSender());
    }

    /**
     * @dev Throws if called by any account other than the owner.
     */
    modifier onlyOwner() {
        _checkOwner();
        _;
    }

    /**
     * @dev Returns the address of the current owner.
     */
    function owner() public view virtual returns (address) {
        return _owner;
    }

    /**
     * @dev Throws if the sender is not the owner.
     */
    function _checkOwner() internal view virtual {
        require(owner() == _msgSender(), "Ownable: caller is not the owner");
    }

    /**
     * @dev Leaves the contract without owner. It will not be possible to call
     * \`onlyOwner\` functions anymore. Can only be called by the current owner.
     *
     * NOTE: Renouncing ownership will leave the contract without an owner,
     * thereby removing any functionality that is only available to the owner.
     */
    function renounceOwnership() public virtual onlyOwner {
        _transferOwnership(address(0));
    }

    /**
     * @dev Transfers ownership of the contract to a new account (\`newOwner\`).
     * Can only be called by the current owner.
     */
    function transferOwnership(address newOwner) public virtual onlyOwner {
        require(newOwner != address(0), "Ownable: new owner is the zero address");
        _transferOwnership(newOwner);
    }

    /**
     * @dev Transfers ownership of the contract to a new account (\`newOwner\`).
     * Internal function without access restriction.
     */
    function _transferOwnership(address newOwner) internal virtual {
        address oldOwner = _owner;
        _owner = newOwner;
        emit OwnershipTransferred(oldOwner, newOwner);
    }
}

/**
 * @title Leaderboard
 * @dev Stores the top 100 high scores. 
 *      Implements Pay-to-Play mechanics:
 *      - 1 DOGE entry fee.
 *      - 25% goes to owner (dev fee).
 *      - 75% goes to the Prize Pool.
 *      - Every hour, the Prize Pool is paid to the leaderboard winner.
 *      - Leaderboard resets after payout.
 */
contract Leaderboard is Ownable {
    struct Score {
        address player;
        uint256 score;
        uint256 timestamp;
    }

    Score[] public leaderboard;
    uint256 constant MAX_LEADERBOARD_SIZE = 100;

    // Game Config
    uint256 public gameCost = 1 ether; // 1 DOGE
    uint256 public prizePool;
    uint256 public gameEndTime;

    // Ticket: True if user has paid for a game but not yet submitted
    mapping(address => bool) public hasTicket;

    event NewHighScore(address indexed player, uint256 score, uint256 rank);
    event PrizePaid(address indexed winner, uint256 amount, uint256 timestamp);
    event PaymentFailed(address indexed recipient, uint256 amount);
    event GameStarted(address indexed player, uint256 timestamp);
    event PotUpdated(uint256 newAmount);

    constructor() {
        gameEndTime = getNextTeatime(block.timestamp);
    }

    /**
     * @dev Calculates the next XX:42:00 timestamp.
     */
    function getNextTeatime(uint256 _now) public pure returns (uint256) {
        uint256 currentSeconds = _now % 3600; 
        uint256 targetSeconds = 42 * 60;      

        if (currentSeconds < targetSeconds) {
            return _now + (targetSeconds - currentSeconds);
        } else {
            return _now + (3600 - currentSeconds) + targetSeconds;
        }
    }

    /**
     * @dev Player pays 1 DOGE to start a game.
     *      Checks if the previous game ended (and pays out winner if so).
     *      Splits fee: 25% owner, 75% pot.
     */
    function startGame() external payable {
        require(msg.value >= gameCost, "Insufficient payment");

        // 1. Check for hourly payout trigger BEFORE processing new pot addition
        distributePrize();

        // 2. Split Payment
        uint256 devFee = (msg.value * 25) / 100;
        uint256 potShare = msg.value - devFee;

        // Transfer dev fee (Safe Call)
        (bool success, ) = payable(owner()).call{value: devFee}("");
        require(success, "Dev fee transfer failed");

        // Add to Pot
        prizePool += potShare;
        emit PotUpdated(prizePool);

        // 3. Grant Ticket (Overwrites previous unused ticket)
        hasTicket[msg.sender] = true;
        
        emit GameStarted(msg.sender, block.timestamp);
    }

    /**
     * @dev Submits a score. Consumes Ticket.
     */
    function submitScore(uint256 _score) external {
        require(hasTicket[msg.sender] == true, "No ticket. Pay to play.");
        
        // Consume Ticket
        hasTicket[msg.sender] = false;

        // Check availability (Timer might have expired during gameplay)
        distributePrize();

        // Standard Leaderboard Logic
        uint256 length = leaderboard.length;
        if (length < MAX_LEADERBOARD_SIZE) {
            _insertScore(_score);
            return;
        }

        // Check if it beats the lowest
        if (_score > leaderboard[length - 1].score) {
            leaderboard.pop();
            _insertScore(_score);
        }
    }

    /**
     * @dev Public: Triggered externally (by bot/frontend) OR internally (by game actions).
     */
    function distributePrize() public {
        if (block.timestamp >= gameEndTime) {
            uint256 amount = prizePool;
            
            // Check availability - Must have players to pay out
            if (leaderboard.length > 0) {
                address winner = leaderboard[0].player;
                
                // --- EFFECTS (Reset State First) ---
                prizePool = 0;
                delete leaderboard; 
                gameEndTime = getNextTeatime(block.timestamp);

                // --- INTERACTIONS (External Call Last) ---
                if (amount > 0) {
                    // Safe Payout: Do NOT revert if it fails, just emit event.
                    // Funds remain in contract (can be recovered by owner).
                    (bool sent, ) = payable(winner).call{value: amount}("");
                    if (!sent) {
                        emit PaymentFailed(winner, amount);
                    } else {
                        emit PrizePaid(winner, amount, block.timestamp);
                    }
                }
            } else {
                // No players? Just restart the timer, keep the pot.
                gameEndTime = getNextTeatime(block.timestamp);
            }
        }
    }

    function _insertScore(uint256 _score) internal {
        uint256 length = leaderboard.length;
        leaderboard.push(Score({
            player: msg.sender,
            score: _score,
            timestamp: block.timestamp
        }));

        for (uint256 i = length; i > 0; i--) {
            if (leaderboard[i].score > leaderboard[i - 1].score) {
                Score memory temp = leaderboard[i];
                leaderboard[i] = leaderboard[i - 1];
                leaderboard[i - 1] = temp;
            } else {
                break;
            }
        }
    }

    // --- Views ---

    function getLeaderboard() external view returns (Score[] memory) {
        return leaderboard;
    }

    function getLowestQualifyingScore() external view returns (uint256) {
        if (leaderboard.length < MAX_LEADERBOARD_SIZE) {
            return 0;
        }
        return leaderboard[leaderboard.length - 1].score;
    }

    function getPotInfo() external view returns (uint256 pot, uint256 endTime) {
        return (prizePool, gameEndTime);
    }

    // --- Admin ---

    function recoverFunds() external onlyOwner {
        payable(owner()).transfer(address(this).balance);
    }
}
`;

        const logDiv = document.getElementById('log');
        function log(msg, type = '') {
            const line = document.createElement('div');
            line.innerText = msg;
            if (type) line.className = type;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // --- WORKER SCRIPT ---
        // We embed the worker logic in a Blob to avoid separate file issues
        const workerScript = `
        self.importScripts('https://binaries.soliditylang.org/bin/soljson-v0.8.17+commit.8df45f5f.js');

        let compileJSON;

        // Wait for Module to init
        // Newer solc builds might be async or require explicit init
        var wrapper = function(soljson) {
            if ('_solidity_compile' in soljson) {
                return soljson.cwrap('solidity_compile', 'string', ['string', 'number']);
            }
        };

        self.onmessage = function(e) {
            const msg = e.data;
            if (msg.command === 'load') {
                // Check if loaded
                if (self.Module) {
                    // Try to wrap
                    try {
                        compileJSON = self.Module.cwrap('solidity_compile', 'string', ['string', 'number']);
                        self.postMessage({ type: 'loaded', success: true });
                    } catch(err) {
                        self.postMessage({ type: 'log', message: 'Worker Wrap Error: ' + err.message });
                    }
                } else {
                    self.postMessage({ type: 'log', message: 'Module not found in worker' });
                }
            } else if (msg.command === 'compile') {
                if (!compileJSON) {
                     self.postMessage({ type: 'error', message: 'Compiler not loaded' });
                     return;
                }
                try {
                    const output = compileJSON(msg.input, 0);
                    self.postMessage({ type: 'compiled', output: output });
                } catch (e) {
                    self.postMessage({ type: 'error', message: e.toString() });
                }
            }
        };
        `;

        const blob = new Blob([workerScript], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function (e) {
            const data = e.data;
            if (data.type === 'loaded') {
                document.getElementById('compilerState').innerText = "Ready (Worker)";
                document.getElementById('compilerState').style.color = "#0f0";
                log("Compiler loaded in worker thread.", 'success');
            } else if (data.type === 'log') {
                log("[Worker] " + data.message);
            } else if (data.type === 'error') {
                log("[Worker Error] " + data.message, 'error');
            } else if (data.type === 'compiled') {
                handleCompilationResult(data.output);
            }
        };

        // Trigger load
        setTimeout(() => {
            worker.postMessage({ command: 'load' });
        }, 1000);


        // --- WALLET LOGIC ---
        let provider, signer;
        const DOGECHAIN_ID = 2000;

        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) { log('No wallet found! Install MetaMask.', 'error'); return; }
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);

                const network = await provider.getNetwork();
                if (network.chainId !== DOGECHAIN_ID) {
                    log('Wrong network! Switching to Dogechain...', 'warn');
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x7D0' }],
                        });
                        provider = new ethers.providers.Web3Provider(window.ethereum); // re-init
                    } catch (e) {
                        try {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x7D0',
                                    chainName: 'Dogechain Mainnet',
                                    nativeCurrency: { name: 'DOGE', symbol: 'DOGE', decimals: 18 },
                                    rpcUrls: ['https://rpc.dogechain.dog'],
                                    blockExplorerUrls: ['https://explorer.dogechain.dog/']
                                }]
                            });
                        } catch (addError) {
                            log('Failed to switch/add network.', 'error');
                            return;
                        }
                    }
                }

                signer = provider.getSigner();
                const addr = await signer.getAddress();
                document.getElementById('walletInfo').innerText = `Connected: ${addr}`;
                log(`Wallet connected: ${addr}`, 'success');
                document.getElementById('deployBtn').disabled = false;
            } catch (err) {
                log(`Connection Error: ${err.message}`, 'error');
            }
        };

        // --- DEPLOY LOGIC ---
        document.getElementById('deployBtn').onclick = async () => {
            if (!signer) { log("Wallet not connected!", 'error'); return; }
            log("Sending to worker for compilation...");

            const input = JSON.stringify({
                language: 'Solidity',
                sources: { 'Leaderboard.sol': { content: contractSource } },
                settings: { outputSelection: { '*': { '*': ['abi', 'evm.bytecode'] } } }
            });

            worker.postMessage({ command: 'compile', input: input });
        };

        async function handleCompilationResult(outputStr) {
            try {
                const output = JSON.parse(outputStr);

                if (output.errors) {
                    let hasErr = false;
                    output.errors.forEach(e => {
                        log(e.formattedMessage, e.severity === 'error' ? 'error' : 'warn');
                        if (e.severity === 'error') hasErr = true;
                    });
                    if (hasErr) return;
                }

                const contractData = output.contracts['Leaderboard.sol']['Leaderboard'];
                const abi = contractData.abi;
                const bytecode = contractData.evm.bytecode.object;

                log("Compilation successful! Deploying...", 'success');

                const factory = new ethers.ContractFactory(abi, bytecode, signer);
                const contract = await factory.deploy();

                log(`Transaction sent: ${contract.deployTransaction.hash}`, 'warn');
                log("Waiting for confirmation...");

                await contract.deployed();

                log("------------------------------------------------", 'success');
                log(`CONTRACT DEPLOYED SUCCESSFULLY!`, 'success');
                log(`ADDRESS: ${contract.address}`, 'success');
                log("------------------------------------------------", 'success');
                log("PLEASE COPY THE ADDRESS ABOVE AND UPDATE wallet.js", 'warn');
            } catch (e) {
                log("Error handling compilation result: " + e.message, 'error');
            }
        }
    </script>
</body>

</html>
